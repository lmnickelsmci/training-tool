<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Male Contraception Advocate Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #002D72; --navy-dark: #001f52; --orange: #D86018; --orange-light: #f0752a;
      --white: #FFFFFF; --bg: #F4F6FA; --text: #1a1a2e; --text-muted: #5a6475;
      --border: #d8deea; --correct: #1a7a4a; --correct-bg: #e8f5ee; --wrong: #c0392b; --wrong-bg: #fdf0ee;
    }
    html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    .slide-in { animation: slideIn 0.4s ease forwards; }
    .app-shell { min-height:100vh; display:flex; flex-direction:column; }
    .top-bar {
      background:var(--navy); padding:0 32px; height:64px; display:flex; align-items:center;
      justify-content:space-between; position:sticky; top:0; z-index:100;
      box-shadow:0 2px 12px rgba(0,45,114,.25);
    }
    .logo-area { display:flex; align-items:center; gap:12px; }
    .logo-badge {
      width:38px; height:38px; background:var(--orange); border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:white;
    }
    .logo-text { color:white; font-size:15px; font-weight:600; letter-spacing:.3px; }
    .logo-sub { color:rgba(255,255,255,.6); font-size:12px; }
    .progress-track { flex:1; max-width:380px; margin:0 32px; }
    .progress-label { color:rgba(255,255,255,.55); font-size:11px; margin-bottom:4px; }
    .progress-steps { display:flex; gap:4px; }
    .progress-step { flex:1; height:4px; border-radius:2px; background:rgba(255,255,255,.2); transition:background .4s; }
    .progress-step.done { background:var(--orange); }
    .progress-step.active { background:rgba(255,255,255,.7); }
    .main-content { flex:1; display:flex; align-items:flex-start; justify-content:center; padding:40px 24px 60px; }
    .card { background:white; border-radius:16px; box-shadow:0 4px 24px rgba(0,45,114,.08); width:100%; max-width:760px; overflow:hidden; }
    .card-header { background:var(--navy); padding:28px 36px 24px; }
    .module-tag { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--orange); margin-bottom:8px; }
    .card-title { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; line-height:1.25; color:white; }
    .card-body { padding:36px; }
    .reg-intro { display:grid; grid-template-columns:1fr 1fr; gap:36px; align-items:start; margin-bottom:32px; }
    @media(max-width:600px){ .reg-intro { grid-template-columns:1fr; } }
    .reg-about h3 { font-family:'Playfair Display',serif; font-size:20px; color:var(--navy); margin-bottom:10px; }
    .reg-about p { font-size:14px; line-height:1.7; color:var(--text-muted); margin-bottom:10px; }
    .reg-meta { display:flex; flex-direction:column; gap:10px; }
    .meta-chip { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 16px; display:flex; align-items:center; gap:10px; font-size:13px; }
    .meta-chip .icon { font-size:20px; }
    .meta-chip strong { color:var(--navy); display:block; font-size:12px; font-weight:600; margin-bottom:1px; }
    .form-group { margin-bottom:20px; }
    .form-label { display:block; font-size:13px; font-weight:600; color:var(--navy); margin-bottom:6px; }
    .form-input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:11px 14px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); transition:border-color .2s,box-shadow .2s; outline:none; }
    .form-input:focus { border-color:var(--navy); box-shadow:0 0 0 3px rgba(0,45,114,.1); }
    .form-error { font-size:12px; color:var(--wrong); margin-top:4px; }
    .slide-counter { font-size:12px; color:var(--text-muted); margin-bottom:6px; }
    .slide-body { font-size:15px; line-height:1.75; color:#333; margin-bottom:20px; }
    .callout-box { background:linear-gradient(135deg,#fff3e8,#fde8d4); border-left:4px solid var(--orange); border-radius:0 10px 10px 0; padding:16px 20px; margin:20px 0; }
    .callout-label { font-size:10px; font-weight:700; letter-spacing:1.2px; color:var(--orange); text-transform:uppercase; margin-bottom:6px; }
    .callout-text { font-size:14px; line-height:1.6; color:#5a2800; }
    .myth-box { background:var(--bg); border-radius:12px; padding:16px 20px; margin:8px 0; border:1px solid var(--border); }
    .myth-q { font-size:13px; font-weight:600; color:var(--navy); margin-bottom:6px; }
    .myth-q::before { content:'❓ '; }
    .myth-a { font-size:13px; line-height:1.6; color:var(--text-muted); }
    .myth-a::before { content:'✓ '; color:var(--correct); font-weight:700; }
    .visual-block { background:linear-gradient(135deg,#eef2ff,#f4f6fa); border-radius:12px; padding:24px; margin:20px 0; display:flex; align-items:center; justify-content:center; min-height:160px; }
    .slide-dots { display:flex; gap:6px; justify-content:center; margin:24px 0 8px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:all .3s; }
    .dot.active { background:var(--navy); width:22px; border-radius:4px; }
    .quiz-subtitle { font-size:13px; color:var(--text-muted); margin-bottom:24px; }
    .question-block { margin-bottom:28px; }
    .question-text { font-size:15px; font-weight:500; line-height:1.6; margin-bottom:12px; color:var(--text); }
    .question-number { color:var(--orange); font-weight:700; }
    .options-list { display:flex; flex-direction:column; gap:8px; }
    .option-btn { display:flex; align-items:center; gap:12px; padding:12px 16px; border:1.5px solid var(--border); border-radius:10px; background:white; cursor:pointer; text-align:left; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); transition:all .2s; }
    .option-btn:hover:not(:disabled) { border-color:var(--navy); background:#f0f4ff; }
    .option-btn:disabled { cursor:default; }
    .option-btn.selected { border-color:var(--navy); background:#eef2ff; }
    .option-btn.correct { border-color:var(--correct); background:var(--correct-bg); color:var(--correct); }
    .option-btn.wrong { border-color:var(--wrong); background:var(--wrong-bg); color:var(--wrong); }
    .option-btn.reveal-correct { border-color:var(--correct); background:var(--correct-bg); }
    .option-letter { width:26px; height:26px; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; transition:all .2s; }
    .option-btn.correct .option-letter,.option-btn.reveal-correct .option-letter { background:var(--correct); color:white; }
    .option-btn.wrong .option-letter { background:var(--wrong); color:white; }
    .option-btn.selected .option-letter { background:var(--navy); color:white; }
    .tf-options { display:flex; gap:12px; }
    .tf-options .option-btn { flex:1; justify-content:center; }
    .missed-indicator { font-size:12px; color:var(--wrong); margin-top:6px; padding-left:4px; }
    .explanation-box { background:var(--correct-bg); border:1px solid #a3d9b8; border-radius:8px; padding:12px 14px; margin-top:10px; font-size:13px; line-height:1.6; color:#1a5c3a; }
    .result-banner { border-radius:12px; padding:20px 24px; margin-bottom:28px; display:flex; align-items:center; gap:16px; }
    .result-banner.pass { background:var(--correct-bg); border:1.5px solid #a3d9b8; }
    .result-banner.fail { background:var(--wrong-bg); border:1.5px solid #e8b0aa; }
    .result-icon { font-size:36px; }
    .result-title { font-family:'Playfair Display',serif; font-size:20px; margin-bottom:4px; }
    .result-banner.pass .result-title { color:var(--correct); }
    .result-banner.fail .result-title { color:var(--wrong); }
    .result-sub { font-size:13px; color:var(--text-muted); }
    .score-bar-wrap { margin:16px 0; }
    .score-bar-label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
    .score-bar-track { height:10px; background:var(--border); border-radius:5px; overflow:hidden; }
    .score-bar-fill { height:100%; border-radius:5px; transition:width 1s ease; }
    .score-bar-fill.pass-color { background:var(--correct); }
    .score-bar-fill.fail-color { background:var(--orange); }
    .btn { display:inline-flex; align-items:center; gap:8px; padding:13px 28px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; border:none; transition:all .2s; }
    .btn-primary { background:var(--navy); color:white; }
    .btn-primary:hover { background:var(--navy-dark); transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,45,114,.3); }
    .btn-primary:disabled { background:#a0aabb; cursor:not-allowed; transform:none; box-shadow:none; }
    .btn-secondary { background:transparent; color:var(--navy); border:1.5px solid var(--navy); }
    .btn-secondary:hover { background:#eef2ff; }
    .btn-orange { background:var(--orange); color:white; }
    .btn-orange:hover { background:var(--orange-light); transform:translateY(-1px); box-shadow:0 4px 14px rgba(216,96,24,.35); }
    .btn-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:24px; }
    .btn-row.right { justify-content:flex-end; }
    .btn-row.center { justify-content:center; }
    .btn-row.space { justify-content:space-between; }
    .divider { height:1px; background:var(--border); margin:24px 0; }
    .tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.4px; }
    .tag-navy { background:#eef2ff; color:var(--navy); }
    .tag-orange { background:#fff0e6; color:var(--orange); }
    /* Certificate */
    .cert-wrap { border:3px solid var(--navy); border-radius:16px; padding:40px; text-align:center; margin:24px 0; background:white; position:relative; overflow:hidden; }
    .cert-wrap::before { content:''; position:absolute; top:0; left:0; right:0; height:8px; background:linear-gradient(90deg,var(--navy),var(--orange),var(--navy)); }
    .cert-badge { width:60px; height:60px; background:var(--orange); border-radius:12px; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:28px; font-weight:700; color:white; margin:0 auto 16px; }
    .cert-title { font-family:'Playfair Display',serif; font-size:13px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
    .cert-heading { font-family:'Playfair Display',serif; font-size:28px; font-weight:700; color:var(--navy); margin-bottom:4px; }
    .cert-sub { font-size:13px; color:var(--text-muted); margin-bottom:24px; }
    .cert-name { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; color:var(--orange); margin:8px 0; }
    .cert-line { height:2px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:20px 0; }
    .cert-scores { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin:20px 0; }
    .cert-score-cell { background:var(--bg); border-radius:8px; padding:10px 6px; font-size:12px; }
    .cert-score-cell .mod-label { color:var(--text-muted); font-size:10px; margin-bottom:4px; }
    .cert-score-cell .mod-score { font-size:18px; font-weight:700; color:var(--navy); }
    .cert-overall { font-size:22px; font-weight:700; color:var(--correct); margin:8px 0; }
    .cert-date { font-size:13px; color:var(--text-muted); }
    /* Summary score grid */
    .module-summary { display:flex; flex-direction:column; gap:10px; margin:20px 0; }
    .module-row { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--bg); border-radius:10px; border:1px solid var(--border); }
    .module-row-label { font-size:13px; font-weight:600; color:var(--navy); flex:1; }
    .module-row-score { font-size:16px; font-weight:700; }
    .module-row-score.pass { color:var(--correct); }
    .module-row-score.fail { color:var(--wrong); }
    .qa-item { background:var(--bg); border-radius:10px; padding:12px 16px; margin:8px 0; border:1px solid var(--border); }
    .qa-q { font-size:13px; font-weight:600; color:var(--navy); margin-bottom:5px; }
    .qa-q::before { content:'Q: '; color:var(--orange); }
    .qa-a { font-size:13px; line-height:1.6; color:var(--text-muted); }
    .qa-a::before { content:'A: '; color:var(--correct); font-weight:600; }
    .intro-points { display:flex; flex-direction:column; gap:10px; margin:20px 0 28px; }
    .intro-point { display:flex; align-items:flex-start; gap:12px; padding:14px 18px; background:var(--bg); border-radius:10px; border:1px solid var(--border); font-size:14px; line-height:1.6; }
    .intro-point-icon { font-size:22px; flex-shrink:0; margin-top:2px; }
    @media print {
      .top-bar,.btn,.btn-row { display:none !important; }
      .card { box-shadow:none; }
      .cert-wrap { border-color:#000; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── Google Sheet logging ─────────────────────────────────────────────────────

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJNWJWxqRLFVXLvRuqhD5v1LcPvQav6ioInRLxZUntkyVAc1fYxkbmiFi7bZi-PpqeSQ/exec";

function logCompletion(user, scores, attempts) {
  const filled = scores.map(s => s ?? 0);
  const avg = Math.round(filled.reduce((a,b)=>a+b,0)/filled.length);
  const passed = scores.every(s => s >= 80);
  fetch(APPS_SCRIPT_URL, {
    method:"POST", mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      timestamp: new Date().toISOString(),
      name: user.name, email: user.email,
      mod1_score: scores[0]??null, mod2_score: scores[1]??null,
      mod3_score: scores[2]??null, mod4_score: scores[3]??null,
      mod5_score: scores[4]??null, avg_score: avg, passed,
      attempts_mod1: attempts[0]??null, attempts_mod2: attempts[1]??null,
      attempts_mod3: attempts[2]??null, attempts_mod4: attempts[3]??null,
      attempts_mod5: attempts[4]??null,
    })
  }).catch(e => console.warn("Log failed:", e));
}

// ─── Module data ──────────────────────────────────────────────────────────────

const MODULES = [
  // ── MODULE 1: Why Male Contraception Matters ──────────────────────────────
  {
    num: 1,
    title: "Why Male Contraception Matters",
    time: "8–10 min",
    passThreshold: 7,
    slides: [
      {
        headline: "The Unintended Pregnancy Problem",
        body: "Approximately 45% of all pregnancies globally are unintended — that's 121 million each year. Despite this, the responsibility for contraception has historically fallen almost entirely on women. Women have access to more than 10 different methods. Men have two: condoms and vasectomy. Many women who use contraception also report side effects, difficulty accessing the right method, or a desire to share the burden with their partner. Male contraception isn't just about adding options for men — it's about expanding reproductive choice for everyone.",
        callout: { label:"Key Fact", text:"121 million unintended pregnancies occur globally every year — and women carry nearly all the contraceptive burden, often with limited options that work well for them." },
        visual: (
          <svg viewBox="0 0 420 150" xmlns="http://www.w3.org/2000/svg" style={{width:'100%',maxWidth:420}}>
            {/* Left: bar chart */}
            <text x="10" y="16" fill="#444" fontSize="11" fontFamily="DM Sans,sans-serif" fontWeight="600">Contraceptive options available:</text>
            <text x="10" y="36" fill="#666" fontSize="9" fontFamily="DM Sans,sans-serif">Women</text>
            <rect x="10" y="40" width="168" height="18" rx="4" fill="#002D72"/>
            <text x="94" y="53" textAnchor="middle" fill="white" fontSize="9" fontFamily="DM Sans,sans-serif" fontWeight="700">10+ methods</text>
            <text x="10" y="76" fill="#666" fontSize="9" fontFamily="DM Sans,sans-serif">Men</text>
            <rect x="10" y="80" width="32" height="18" rx="4" fill="#D86018"/>
            <text x="50" y="93" fill="#D86018" fontSize="9" fontFamily="DM Sans,sans-serif" fontWeight="600">2 methods</text>
            <line x1="10" y1="112" x2="190" y2="112" stroke="#eee" strokeWidth="1"/>
            <text x="10" y="126" fill="#888" fontSize="9" fontFamily="DM Sans,sans-serif">Gap reflects underinvestment,</text>
            <text x="10" y="139" fill="#888" fontSize="9" fontFamily="DM Sans,sans-serif">not a biological impossibility.</text>
            {/* Divider */}
            <line x1="198" y1="10" x2="198" y2="148" stroke="#e8e8e8" strokeWidth="1.5"/>
            {/* Right: donut chart */}
            <text x="308" y="16" textAnchor="middle" fill="#444" fontSize="11" fontFamily="DM Sans,sans-serif" fontWeight="600">Global pregnancies:</text>
            <circle cx="308" cy="86" r="34" fill="none" stroke="#dde6ff" strokeWidth="24"/>
            <circle cx="308" cy="86" r="34" fill="none" stroke="#D86018" strokeWidth="24"
              strokeDasharray="96.3 213.6"
              transform="rotate(-90 308 86)"/>
            <text x="308" y="83" textAnchor="middle" fill="#D86018" fontSize="15" fontFamily="Playfair Display,serif" fontWeight="700">45%</text>
            <text x="308" y="96" textAnchor="middle" fill="#888" fontSize="8" fontFamily="DM Sans,sans-serif">unintended</text>
            <rect x="212" y="138" width="8" height="8" fill="#D86018" rx="2"/>
            <text x="223" y="145" fill="#555" fontSize="9" fontFamily="DM Sans,sans-serif">Unintended (45% = 121M/yr)</text>
          </svg>
        )
      },
      {
        headline: "What People Actually Want",
        body: "MCI consumer research tells a clear story: 8 in 10 men aged 18–44 in the U.S. are actively trying to prevent pregnancy. Of those, 8 in 10 prefer non-hormonal options, and nearly 9 in 10 want something reversible. Data indicates this is a global pattern, not uniquely American — demand for male methods has been documented across multiple regions and cultures. Many women also express dissatisfaction with available contraceptive options — side effects, difficulty of access, and the desire for a partner to share the responsibility. Expanding male options is about giving everyone more choices.",
        callout: { label:"Key Fact", text:"The barrier to male contraceptive use isn't willingness — 8 in 10 men are already actively trying to prevent pregnancy. The barrier is the absence of trusted, accessible options." },
        visual: (
          <svg viewBox="0 0 420 138" xmlns="http://www.w3.org/2000/svg" style={{width:'100%',maxWidth:420}}>
            {[{label:"Actively trying to prevent pregnancy",pct:80,y:10,color:"#002D72"},{label:"Prefer non-hormonal method",pct:80,y:50,color:"#002D72"},{label:"Want reversible method",pct:89,y:90,color:"#D86018"}].map(({label,pct,y,color})=>(
              <g key={y}>
                <text x="10" y={y+12} fill="#333" fontSize="11" fontFamily="DM Sans,sans-serif">{label}</text>
                <rect x="10" y={y+16} width="310" height="12" rx="6" fill="#eee"/>
                <rect x="10" y={y+16} width={pct*3.1} height="12" rx="6" fill={color}/>
                <text x="330" y={y+27} fill="#333" fontSize="13" fontFamily="DM Sans,sans-serif" fontWeight="700">{pct}%</text>
              </g>
            ))}
            <text x="10" y="128" fill="#aaa" fontSize="10" fontFamily="DM Sans,sans-serif">Source: MCI U.S. Consumer Research</text>
          </svg>
        )
      },
      {
        headline: "Why This Matters Beyond Pregnancy",
        body: "Male contraception is a reproductive equity issue. Expanding options connects to multiple UN Sustainable Development Goals: reducing poverty, advancing gender equality, and improving health outcomes. Contraception access affects education, economic opportunity, and family stability — especially in low- and middle-income countries where unintended pregnancy rates are highest. When contraception is shared, couples gain agency together. Reproductive autonomy isn't a transaction where one partner acts — it's a shared space where everyone has real options.",
        callout: { label:"Key Framing", text:"\"Reproductive autonomy for all\" — not a transaction where one partner acts and the other benefits, but a shared space where everyone has real options." },
        visual: (
          <svg viewBox="0 0 420 110" xmlns="http://www.w3.org/2000/svg" style={{width:'100%',maxWidth:420}}>
            {[{x:20,label:"SDG 1",sub:"No Poverty",c:"#D86018"},{x:110,label:"SDG 3",sub:"Good Health",c:"#002D72"},{x:200,label:"SDG 5",sub:"Gender Equality",c:"#D86018"},{x:290,label:"SDG 10",sub1:"Reduced",sub2:"Inequalities",c:"#002D72"}].map(({x,label,sub,sub1,sub2,c})=>(
              <g key={x}>
                <rect x={x} y="10" width="80" height="80" rx="12" fill={c}/>
                <text x={x+40} y="42" textAnchor="middle" fill="white" fontSize="12" fontFamily="DM Sans,sans-serif" fontWeight="700">{label}</text>
                {sub && <text x={x+40} y="60" textAnchor="middle" fill="rgba(255,255,255,.8)" fontSize="9" fontFamily="DM Sans,sans-serif">{sub}</text>}
                {sub1 && <text x={x+40} y="56" textAnchor="middle" fill="rgba(255,255,255,.8)" fontSize="9" fontFamily="DM Sans,sans-serif">{sub1}</text>}
                {sub2 && <text x={x+40} y="68" textAnchor="middle" fill="rgba(255,255,255,.8)" fontSize="9" fontFamily="DM Sans,sans-serif">{sub2}</text>}
              </g>
            ))}
            <text x="210" y="104" textAnchor="middle" fill="#888" fontSize="10" fontFamily="DM Sans,sans-serif">Male contraception advances multiple UN Sustainable Development Goals</text>
          </svg>
        )
      },
      {
        headline: "MCI's Role in the Field",

        headline: "The Path from Discovery to Approval",
        body: (
          <div>
            <p style={{fontSize:14,color:'var(--text-muted)',marginBottom:10,lineHeight:1.7}}>Before any new medicine reaches patients, it goes through a defined set of steps:</p>
            <ul style={{fontSize:14,color:'#333',lineHeight:1.75,paddingLeft:20,marginBottom:10}}>
              <li style={{marginBottom:6}}><strong>Discovery</strong> — researchers identify a biological target</li>
              <li style={{marginBottom:6}}><strong>Preclinical</strong> — the approach is tested in the lab and in animals</li>
              <li style={{marginBottom:6}}><strong>Phase I</strong> — first tested in a small group of humans, primarily for safety</li>
              <li style={{marginBottom:6}}><strong>Phase II</strong> — tested in a larger group for safety and early effectiveness</li>
              <li style={{marginBottom:6}}><strong>Phase III</strong> — large-scale trial to confirm effectiveness</li>
              <li style={{marginBottom:6}}><strong>Approval</strong> — regulators (e.g., FDA in the U.S.) review the data before a drug can be sold</li>
            </ul>
            <p style={{fontSize:14,color:'var(--text-muted)',lineHeight:1.7}}>The average timeline from discovery to approval is 10–15 years and can cost $1–2 billion. This is not unique to male contraceptives — it is the standard timeline for any new drug.</p>
          </div>
        ),
        callout: { label:"Key Fact", text:"10–15 years and $1–2 billion is typical for any new drug. The pipeline is long by design, to protect safety." },
        visual: (

      {
        headline: "Why Male Contraceptives Face Extra Challenges",
        body: (
          <div>
            <p style={{fontSize:14,color:'var(--text-muted)',marginBottom:10,lineHeight:1.7}}>All drugs face the standard hurdles described above. But male contraceptives face four additional challenges:</p>
            <ul style={{fontSize:14,color:'#333',lineHeight:1.75,paddingLeft:20,marginBottom:12}}>
              <li style={{marginBottom:8}}><strong>Healthy user problem</strong> — The people using contraceptives aren't sick. Regulators require near-zero side effects — a much higher bar than for treating a disease — and the method must be safe for long-term, ongoing use.</li>
              <li style={{marginBottom:8}}><strong>No regulatory pathway</strong> — Unlike female contraceptives, there are no established FDA regulatory guidelines and no clear approval pathway for male methods.</li>
              <li style={{marginBottom:8}}><strong>Historical underinvestment</strong> — Male reproductive health has been deprioritized by funders and pharmaceutical companies for decades, leaving the field chronically under-resourced.</li>
              <li style={{marginBottom:8}}><strong>Low public awareness</strong> — Most people don't know new male methods are being developed — limiting demand signals and political will.</li>

            <p style={{fontSize:14,color:'var(--text-muted)',lineHeight:1.7}}>Some candidates are also <strong>repurposed drugs</strong> — originally developed to treat other conditions before showing contraceptive potential. Repurposing can speed up development because some early safety data already exists.</p>

      {
        headline: "Spermatogenesis: The 74-Day Cycle",
        body: "Sperm are continuously produced in the seminiferous tubules inside the testicles. The full process — called spermatogenesis — takes approximately 74 days from stem cell to mature sperm. It is regulated by hormones from the brain: testosterone, FSH (follicle-stimulating hormone), and LH (luteinizing hormone). Both hormonal and non-hormonal methods work by stopping or disrupting sperm production — if you stop sperm from being made, you prevent pregnancy. Because spermatogenesis takes 74 days, hormonal methods require several weeks to fully suppress sperm production, and sperm already in the system need additional time to clear out. This is why men in trials are not immediately protected on day one of use.",

function ScoreBar({ label, pct }) {
  const [display, setDisplay] = React.useState(0);
  React.useEffect(() => {
    const t = setTimeout(() => setDisplay(pct), 100);
    return () => clearTimeout(t);
  }, [pct]);
  const cls = pct >= 80 ? 'pass-color' : 'fail-color';
  return (
    <div className="score-bar-wrap">
      <div className="score-bar-label"><span>{label || 'Score'}</span><strong>{pct}%</strong></div>
      <div className="score-bar-track">
        <div className={`score-bar-fill ${cls}`} style={{width: display + '%'}} />
      </div>
    </div>
  );
}

// ─── TopBar ───────────────────────────────────────────────────────────────────

function TopBar({ currentModIdx, phase }) {
  // 8 steps: registration + intro + 5 modules + completion
  const totalSteps = 8;
  let doneCount = 0;
  let activeIdx = 0;
  if (phase === 'registration') { doneCount = 0; activeIdx = 0; }
  else if (phase === 'intro') { doneCount = 1; activeIdx = 1; }
  else if (phase === 'complete') { doneCount = 8; activeIdx = 7; }
  else { doneCount = currentModIdx + 2; activeIdx = currentModIdx + 2; }

  return (
    <div className="top-bar">
      <div className="logo-area">
        <div className="logo-badge">M</div>
        <div>
          <div className="logo-text">Advocate Training</div>
          <div className="logo-sub">Male Contraceptive Initiative</div>
        </div>
      </div>
      <div className="progress-track">
        <div className="progress-label">
          {phase === 'registration' ? 'Get started' :
           phase === 'intro' ? 'Introduction' :
           phase === 'complete' ? 'Complete!' :
           `Module ${currentModIdx + 1} of 5`}
        </div>
        <div className="progress-steps">
          {Array.from({length: totalSteps}).map((_, i) => (
            <div key={i} className={`progress-step ${i < doneCount ? 'done' : i === activeIdx ? 'active' : ''}`} />
          ))}
        </div>
      </div>
    </div>
  );
}

function QuizScreen({ mod, attempt, onSubmit }) {

  function handleSubmit() {
    const results = mod.quiz.map(q => ({
      id: q.id, chosen: answers[q.id], correct: q.correct,
      passed: answers[q.id] === q.correct
    }));
    onSubmit(results);
  }

  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-header">
          <div className="module-tag">Module {mod.num} · Knowledge Check{attempt>1?` (Attempt ${attempt})`:''}</div>
          <div className="card-title">Test Your Understanding</div>
        </div>
        <div className="card-body">
          <div className="quiz-subtitle">
            {mod.quiz.length} questions — need {mod.passThreshold} correct ({Math.round(mod.passThreshold/mod.quiz.length*100)}%) to pass.
          </div>
          {mod.quiz.map((q,qi)=>(
            <div className="question-block" key={q.id}>
              <div className="question-text">
                <span className="question-number">Q{qi+1}. </span>{q.text}
              </div>
              <div className={q.type==='tf'?'tf-options':'options-list'}>
                {q.options.map((opt,oi)=>(
                  <button key={oi}
                    className={`option-btn ${answers[q.id]===oi?'selected':''}`}
                    onClick={()=>setAnswers(a=>({...a,[q.id]:oi}))}>
                    {q.type!=='tf' && <span className="option-letter">{['A','B','C','D'][oi]}</span>}
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          ))}
          <div className="btn-row right">
            <button className="btn btn-primary" onClick={handleSubmit} disabled={!allAnswered}>
              Submit Answers →
            </button>
          </div>
          {!allAnswered && <p style={{fontSize:12,color:'var(--text-muted)',textAlign:'right',marginTop:8}}>Answer all questions to submit.</p>}
        </div>
      </div>
    </div>
  );
}

// ─── Quiz results screen ──────────────────────────────────────────────────────

function QuizResultsScreen({ mod, results, attempt, passed, onRetry, onContinue, isLast }) {
  const score = Math.round(results.filter(r=>r.passed).length / results.length * 100);
  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-header">
          <div className="module-tag">Module {mod.num} · Results</div>
          <div className="card-title">{passed ? 'Well done — you passed!' : "Not quite — let's review"}</div>
        </div>
        <div className="card-body">
          <div className={`result-banner ${passed?'pass':'fail'}`}>
            <div className="result-icon">{passed?'🎉':'📖'}</div>
            <div>
              <div className="result-title">{passed ? `${score}% — Module ${mod.num} Passed` : `${score}% — Need ${Math.round(mod.passThreshold/mod.quiz.length*100)}% to pass`}</div>
              <div className="result-sub">
                {passed
                  ? `${results.filter(r=>r.passed).length} of ${results.length} correct.${attempt>1?` Passed on attempt ${attempt}.`:''}`
                  : `${results.filter(r=>r.passed).length} of ${results.length} correct. Review the content and try again.`}
              </div>
            </div>
          </div>
          <ScoreBar pct={score} />
          <div className="divider"/>
          {mod.quiz.map((q,qi)=>{
            const r = results.find(r=>r.id===q.id);
            const missed = !r.passed;
            return (
              <div className="question-block" key={q.id}>
                <div className="question-text">
                  <span style={{marginRight:6}}>{missed?'❌':'✅'}</span>
                  <span className="question-number">Q{qi+1}. </span>{q.text}
                </div>
                <div className={q.type==='tf'?'tf-options':'options-list'}>
                  {q.options.map((opt,oi)=>{
                    let cls='';
                    if(oi===r.chosen && !r.passed) cls='wrong';
                    if(oi===q.correct && passed) cls='correct';
                    if(oi===q.correct && !passed && missed) cls='reveal-correct';
                    return (
                      <button key={oi} className={`option-btn ${cls}`} disabled>
                        {q.type!=='tf' && <span className="option-letter">{['A','B','C','D'][oi]}</span>}
                        {opt}
                      </button>
                    );
                  })}
                </div>
                {missed && !passed && <div className="missed-indicator">Incorrect — review the module content and try again.</div>}
                {passed && <div className="explanation-box">{q.explanation}</div>}
              </div>
            );
          })}
          <div className="btn-row space">
            {!passed && <button className="btn btn-secondary" onClick={onRetry}>← Review Content & Retry</button>}
            {passed && <button className="btn btn-secondary" onClick={onRetry}>↺ Retake This Module</button>}
            {passed && (
              <button className="btn btn-orange" onClick={onContinue}>
                {isLast ? 'View My Certificate →' : `Continue to Module ${mod.num + 1} →`}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Completion / Certificate ─────────────────────────────────────────────────

function CompletionScreen({ user, scores, attempts, onGoToModule, onRetakeModule }) {
  const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  const allPassed = scores.every(s=>s>=80);
  const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-header">
          <div className="module-tag">MCI · Training Complete</div>
          <div className="card-title">{allPassed ? 'Congratulations — All Modules Passed!' : 'Training Complete'}</div>
        </div>
        <div className="card-body">

          {/* Score summary */}
          <div className="module-summary">
            {MODULES.map((mod,i)=>(
              <div className="module-row" key={mod.num}>
                <div className="module-row-label">Module {mod.num}: {mod.title}</div>
                <div className={`module-row-score ${scores[i]>=80?'pass':'fail'}`}>{scores[i]}%</div>
                <div style={{fontSize:12,color:'var(--text-muted)',marginLeft:4}}>
                  {scores[i]>=80 ? (attempts[i]>1 ? `✓ Passed (attempt ${attempts[i]})` : '✓ Passed') : '✗'}
                </div>
              </div>
            ))}
          </div>

          <div className="divider"/>

          {/* Module navigation */}
          <div style={{marginBottom:8}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--navy)',marginBottom:12}}>Go back to a module:</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {MODULES.map((m,i)=>(
                <div key={m.num} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#f4f6fa',borderRadius:10,padding:'10px 14px',flexWrap:'wrap',gap:8}}>
                  <div style={{fontSize:14,fontWeight:500,color:'var(--navy)'}}>Module {m.num}: {m.title}</div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn btn-secondary" style={{fontSize:12,padding:'5px 12px'}} onClick={()=>onGoToModule(i)}>Review →</button>
                    <button className="btn btn-secondary" style={{fontSize:12,padding:'5px 12px'}} onClick={()=>onRetakeModule(i)}>Retake Quiz</button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="divider"/>

          {/* Certificate */}
          <div className="cert-wrap" id="certificate">
            <div className="cert-badge">M</div>
            <div className="cert-title">Certificate of Completion</div>
            <div className="cert-heading">Male Contraception Advocate Training</div>
            <div className="cert-sub">Male Contraceptive Initiative</div>
            <div style={{fontSize:14,color:'var(--text-muted)',marginBottom:4}}>This certifies that</div>
            <div className="cert-name">{user.name}</div>
            <div style={{fontSize:14,color:'var(--text-muted)',marginTop:4}}>has successfully completed all five modules of the</div>
            <div style={{fontSize:15,fontWeight:600,color:'var(--navy)',margin:'6px 0'}}>MCI Male Contraception Advocate Training</div>
            <div className="cert-line"/>
            <div className="cert-scores">
              {MODULES.map((mod,i)=>(
                <div className="cert-score-cell" key={mod.num}>
                  <div className="mod-label">Mod. {mod.num}</div>
                  <div className="mod-score" style={{color:scores[i]>=80?'var(--correct)':'var(--wrong)'}}>{scores[i]}%</div>
                </div>
              ))}
            </div>
            <div className="cert-overall">Overall: {avg}% — {allPassed ? 'PASS ✓' : 'See module scores above'}</div>
            <div className="cert-date">Completed: {today}</div>
          </div>

          <div className="btn-row center">
            <button className="btn btn-primary" onClick={()=>window.print()}>🖨 Print / Save Certificate</button>
          </div>

          <div className="divider"/>

          {/* Cheat Sheet */}
          <div style={{background:'#f8f9fc',borderRadius:12,padding:'20px 24px',marginTop:8}}>
            <div style={{fontSize:16,fontWeight:700,color:'var(--navy)',marginBottom:4}}>Quick Reference: Key Facts</div>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}>Printable cheat sheet — top takeaways from each module</div>
            {[
              { num:1, title:"Why It Matters", points:[
                "45% of pregnancies globally are unintended — 121 million/year",
                "Women have 10+ methods; men have 2 (condoms + vasectomy)",
                "8 in 10 men are actively trying to prevent pregnancy (MCI research)",
                "8 in 10 prefer non-hormonal; 9 in 10 want reversible",
                "MCI is a U.S. nonprofit — research arm + advocacy arm; no in-house lab",
              ]},
              { num:2, title:"Drug Development", points:[
                "Standard pipeline: Discovery → Preclinical → Phase I → II → III → Approval",
                "Phase I, II, III are all human trials; approval is by FDA (U.S.) or equivalent",
                "Average: 10–15 years, $1–2 billion — standard for any new drug",
                "Extra male contraceptive challenges: healthy user bar, no FDA pathway, underinvestment, low awareness",
                "Repurposed drug = originally developed for another condition; some early safety data exists",
                "Never predict a specific year — say 'candidates in trials now; timing depends on funding and results'",
              ]},
              { num:3, title:"Biology", points:[
                "Key structures: testicles → epididymis → vas deferens → seminal vesicles/prostate → urethra",
                "Spermatogenesis takes ~74 days; regulated by testosterone, FSH, and LH",
                "Both hormonal and non-hormonal methods work by stopping sperm production",
                "Hormonal methods take weeks to work — not immediate protection on day one",
                "Blood-testis barrier limits which drugs can reach developing sperm",
              ]},
              { num:4, title:"Methods & Pipeline", points:[
                "Condoms: 85–98% effective, also protects against STIs",
                "Vasectomy: >99% effective, intended as permanent (reversal possible but success declines)",
                "Hormonal approach: suppresses sperm production via brain signals (e.g., NES/T gel)",
                "Non-hormonal: 4 mechanisms — transport, fertilization, motility, spermatogenesis",
                "Front-runner: NES/T (Phase 2b). Also in Phase 2a: ADAM, YCT-529, Plan A, Consilum, NLS-133",
                "On-demand = taken near time of intercourse (e.g., NLS-133, sAC Inhibitor)",
              ]},
              { num:5, title:"Talking Points", points:[
                "No current male method (except condoms) protects against STIs — say this proactively",
                "MPTs: emerging products designed to prevent both STIs and pregnancy",
                "Never say vasectomy is 'easily reversible' — success rates decline over time",
                "Never give a specific year for when a male method will be available",
                "Don't say trials 'failed' — setbacks are normal in drug development",
                "Don't make it partisan — stay on science, equity, and choice",
                "When unsure: 'I don't know, but I'll find out' — then contact MCI staff",
              ]},
            ].map(({num,title,points})=>(
              <div key={num} style={{marginBottom:14}}>
                <div style={{fontWeight:700,color:'var(--navy)',fontSize:13,marginBottom:4}}>Module {num}: {title}</div>
                <ul style={{margin:0,paddingLeft:18,fontSize:12,lineHeight:1.7,color:'#333'}}>
                  {points.map((p,i)=><li key={i}>{p}</li>)}
                </ul>
              </div>
            ))}
          </div>

        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [user, setUser] = React.useState(null);
  const [phase, setPhase] = React.useState('registration'); // registration | intro | slides | misconceptions | quiz | results | complete
  const [currentModIdx, setCurrentModIdx] = React.useState(0); // 0-indexed
  const [slideIndex, setSlideIndex] = React.useState(0);
  const [attempt, setAttempt] = React.useState(1);
  const [quizResults, setQuizResults] = React.useState(null);
  const [scores, setScores] = React.useState([null,null,null,null,null]);
  const [attempts, setAttempts] = React.useState([1,1,1,1,1]);
  const [modPassed, setModPassed] = React.useState([false,false,false,false,false]);

  const mod = MODULES[currentModIdx];
  const isLastModule = currentModIdx === MODULES.length - 1;

  function startModule(idx) {
    setCurrentModIdx(idx);
    setSlideIndex(0);
    setAttempt(attempts[idx]);
    setPhase('slides');
  }

  function handleBegin(userData) { setUser(userData); setPhase('intro'); }

  function handleSlideNext() {
    if (slideIndex < mod.slides.length - 1) {
      setSlideIndex(i => i + 1);
    } else if (modPassed[currentModIdx]) {
      if (isLastModule) { setPhase('complete'); }
      else startModule(currentModIdx + 1);
    } else {
      setPhase('misconceptions');
    }
  }
  function handleSlideBack() {
    if (slideIndex > 0) {
      setSlideIndex(i => i - 1);
    } else if (currentModIdx > 0) {
      const prevIdx = currentModIdx - 1;
      setCurrentModIdx(prevIdx);
      setSlideIndex(MODULES[prevIdx].slides.length - 1);
      setPhase('slides');
    }
  }
  function handleStartQuiz() { setPhase('quiz'); }

  function handleQuizSubmit(results) {
    const correct = results.filter(r=>r.passed).length;
    const pct = Math.round(correct/results.length*100);
    const passed = correct >= mod.passThreshold;
    const newScores = [...scores]; newScores[currentModIdx] = pct;
    const newPassed = [...modPassed]; newPassed[currentModIdx] = passed;
    setScores(newScores); setModPassed(newPassed); setQuizResults(results);
    setPhase('results');
  }

  function handleRetry() {
    const newPassed = [...modPassed]; newPassed[currentModIdx] = false;
    setModPassed(newPassed);
    const newAttempts = [...attempts]; newAttempts[currentModIdx] += 1;
    setAttempts(newAttempts); setAttempt(a=>a+1);
    setSlideIndex(0); setPhase('slides');
  }

  function handleGoToModule(idx) {
    startModule(idx);
  }

  function handleRetakeModule(idx) {
    const newPassed = [...modPassed]; newPassed[idx] = false;
    setModPassed(newPassed);
    const newAttempts = [...attempts]; newAttempts[idx] += 1;
    setAttempts(newAttempts);
    setCurrentModIdx(idx);
    setSlideIndex(0);
    setAttempt(newAttempts[idx]);
    setPhase('slides');
  }

  function handleContinue() {
    if (isLastModule) {
      logCompletion(user, scores, attempts);
      setPhase('complete');
    } else {
      const nextIdx = currentModIdx + 1;
      setAttempt(attempts[nextIdx]);
      startModule(nextIdx);
    }
  }

  return (
    <div className="app-shell">
      <TopBar currentModIdx={currentModIdx} phase={phase}/>
      <div className="main-content">
        {phase==='registration' && <RegistrationScreen onBegin={handleBegin}/>}
        {phase==='intro' && <IntroScreen onBegin={()=>startModule(0)}/>}
        {phase==='slides' && (
          <ContentScreen mod={mod} slideIndex={slideIndex} onNext={handleSlideNext} onBack={handleSlideBack} canGoBack={slideIndex>0 || currentModIdx>0}/>
        )}
        {phase==='misconceptions' && (
          <MisconceptionsScreen mod={mod} onContinue={handleStartQuiz}
            onBack={()=>{ setSlideIndex(mod.slides.length-1); setPhase('slides'); }}/>
        )}
        {phase==='quiz' && (
          <QuizScreen mod={mod} attempt={attempt} onSubmit={handleQuizSubmit}/>
        )}
        {phase==='results' && (
          <QuizResultsScreen
            mod={mod} results={quizResults} attempt={attempt}
            passed={modPassed[currentModIdx]}
            onRetry={handleRetry} onContinue={handleContinue}
            isLast={isLastModule}
          />
        )}
        {phase==='complete' && (
          <CompletionScreen user={user} scores={scores} attempts={attempts}
            onGoToModule={handleGoToModule} onRetakeModule={handleRetakeModule}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
